services:
  backend:
    build: ./backend
    restart: unless-stopped
    expose:
      - "5000"
    volumes:
      - ${OPENCLAW_MONITOR_DIR:-/root/.openclaw/monitor}:/monitor:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-8080}:80"
    depends_on:
      - backend
